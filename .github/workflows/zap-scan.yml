name: "OWASP ZAP Security Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # 毎週月曜 9:30 JST (0:30 UTC) に自動実行
    - cron: '30 0 * * 1'
  workflow_dispatch:
    # 手動実行も可能
    inputs:
      target_url:
        description: 'スキャン対象URL'
        required: false
        default: 'https://ginza-rosso-fukuoka.netlify.app/'

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: ZAP Baseline Scan (ginza-rosso LP)
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: ${{ github.event.inputs.target_url || 'https://ginza-rosso-fukuoka.netlify.app/' }}
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
        # -a: Ajax spider も使用（JS レンダリング対応）
        fail_action: false
        # false: 脆弱性が見つかってもCIを止めない（レポートのみ）

    - name: Upload ZAP Report as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-report-${{ github.run_number }}
        path: report_html.html
        retention-days: 30

    - name: Upload ZAP SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: report_sarif.sarif
        category: zap-scan
      continue-on-error: true
      # SARIF upload: GitHub Security タブに結果が表示される
